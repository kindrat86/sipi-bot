app = "sipi-bot-firewall"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  SPENDFIREWALL_DB = "/data/spendfirewall.db"
  SUBS_FILE = "/data/subscribers.txt"
  EVAL_REPORT = "/app/eval_report.json"

[[mounts]]
  source = "sf_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "4s"
    grace_period = "30s"
    method = "get"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
