name: Publish to PyPI

# Publishes to PyPI on every version tag (e.g. v0.1.0) via Trusted Publishing
# (OIDC) — NO API TOKEN NEEDED. One-time setup on PyPI:
#   1. Log in to https://pypi.org → Account → Publishing → "Add a pending publisher"
#   2. PyPI Project Name: sipi-bot
#      Owner: kindrat86
#      Repository name: sipi-bot
#      Workflow name: publish.yml
#      Environment name: pypi
#   3. Save. Then push a tag: git tag v0.1.0 && git push origin v0.1.0
# The workflow builds + publishes with zero secrets. Every later release: bump
# version in pyproject.toml, tag, push.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # REQUIRED for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password/token: trusted publishing via OIDC.
